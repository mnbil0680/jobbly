<!DOCTYPE html>
<html>
<head>
    <title>Test Frontend</title>
    <style>
        body { font-family: Arial; margin: 20px; }
        .result { padding: 10px; margin: 10px 0; border: 1px solid #ccc; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <h1>Test Endpoints Frontend</h1>
    <div id="results"></div>
    
    <script>
        async function testAPI() {
            const results = document.getElementById('results');
            
            try {
                // Test 1: Single source
                console.log('Testing single source...');
                const res1 = await fetch('/jobbly/src/test_source.php?source=remotive');
                const data1 = await res1.json();
                
                const div1 = document.createElement('div');
                div1.className = 'result success';
                div1.innerHTML = `<strong>✓ Single Source Test:</strong><br/>
                    Source: ${data1.source.name}<br/>
                    Jobs: ${data1.parsing.jobs_found}<br/>
                    Status: ${data1.validation.all_checks_passed ? 'PASSED' : 'PARTIAL'}`;
                results.appendChild(div1);
                
                // Test 2: All sources
                console.log('Testing all sources...');
                const res2 = await fetch('/jobbly/src/test_source.php?all=true');
                const data2 = await res2.json();
                
                const div2 = document.createElement('div');
                div2.className = 'result success';
                div2.innerHTML = `<strong>✓ All Sources Test:</strong><br/>
                    Sources Tested: ${data2.total_sources_tested}<br/>
                    Passed: ${data2.summary.passed}<br/>
                    Failed: ${data2.summary.failed}`;
                results.appendChild(div2);
                
            } catch (error) {
                const div = document.createElement('div');
                div.className = 'result error';
                div.innerHTML = `<strong>✗ Error:</strong><br/>${error.message}`;
                results.appendChild(div);
            }
        }
        
        testAPI();
    </script>
</body>
</html>
