<!-- Test Endpoints Page -->
<div id="testEndpointsContainer" class="container test-endpoints-page" style="display: none;">
    <!-- Header -->
    <div class="test-endpoints-header">
        <h1>🧪 Test Job Sources</h1>
        <p class="subtitle">Test all 15 job sources independently with real-time status</p>
        
        <div class="test-header-controls">
            <button class="btn btn-primary" id="refreshAllBtn" onclick="refreshAllSources()">
                🔄 Refresh All
            </button>
            <span id="lastUpdateTime" class="last-update">Never tested</span>
        </div>
    </div>

    <!-- Summary Stats -->
    <div id="summaryStats" class="summary-stats">
        <div class="stat-box">
            <div class="stat-number" id="passedCount">0</div>
            <div class="stat-label">✓ Working</div>
        </div>
        <div class="stat-box">
            <div class="stat-number" id="failedCount">0</div>
            <div class="stat-label">✗ Failed</div>
        </div>
        <div class="stat-box">
            <div class="stat-number" id="skippedCount">0</div>
            <div class="stat-label">⊘ Skipped</div>
        </div>
        <div class="stat-box">
            <div class="stat-number" id="totalJobs">0</div>
            <div class="stat-label">📊 Total Jobs</div>
        </div>
    </div>

    <!-- Loading Message -->
    <div id="loadingMessage" class="loading-message" style="display: none;">
        <div class="spinner"></div>
        <p>Testing all sources... This may take a minute.</p>
    </div>

    <!-- Sources Grid -->
    <div id="sourcesGrid" class="sources-grid">
        <!-- Cards will be generated by JavaScript -->
    </div>

    <!-- Error Message -->
    <div id="errorMessage" class="error-message" style="display: none;">
        <div class="error-content">
            <h3>Error Loading Sources</h3>
            <p id="errorText"></p>
            <button class="btn btn-danger" onclick="refreshAllSources()">Retry</button>
        </div>
    </div>
</div>
